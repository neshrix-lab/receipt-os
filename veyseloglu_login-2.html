<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sinq OS · Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090c;--s1:#0d1117;--s2:#131920;--s3:#192030;
  --b0:rgba(255,255,255,0.04);--b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.15);
  --text:#dde4f0;--text2:#9aa8be;--muted:#566070;--dim:#2e3a4a;
  --blue:#3b82f6;--bl:#93c5fd;--bd:rgba(59,130,246,0.12);--bb:rgba(59,130,246,0.30);
  --teal:#10d9a0;--tl:#6ee7c7;--td:rgba(16,217,160,0.10);--tb:rgba(16,217,160,0.28);
  --amber:#f59e0b;--al:#fbbf24;--ad:rgba(245,158,11,0.10);--ab:rgba(245,158,11,0.28);
  --purple:#8b5cf6;--pl:#c4b5fd;--pd:rgba(139,92,246,0.12);--pb:rgba(139,92,246,0.30);
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg)}
body{
  font-family:var(--font);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden;
}

/* BG GLOW */
body::before{
  content:'';position:fixed;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 70%);
  top:-100px;left:50%;transform:translateX(-50%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.010) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.010) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;width:100%;max-width:400px}

/* LOGO */
.logo-block{text-align:center;margin-bottom:32px}
.logo-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
.logo-name{font-size:42px;font-weight:900;letter-spacing:-.04em;margin-bottom:8px;line-height:1}
.logo-name em{color:var(--blue);font-style:normal}
.logo-sub{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* CARD */
.card{
  background:var(--s2);border:1px solid var(--b1);border-radius:16px;
  padding:28px;margin-bottom:12px;
}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px}
.card-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:20px}

/* ROLE SELECTOR */
.role-tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--s3);border-radius:10px;padding:3px}
.role-tab{
  flex:1;text-align:center;padding:7px 10px;border-radius:7px;
  font-family:var(--mono);font-size:10px;color:var(--muted);
  cursor:pointer;transition:all .18s;
}
.role-tab:hover{color:var(--text2)}
.role-tab.on{background:var(--s1);border:1px solid var(--b2);color:var(--text)}

/* FIELDS */
.field{margin-bottom:14px}
.field-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:6px;display:block}
.field-input{
  width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:8px;
  padding:11px 13px;color:var(--text);font-family:var(--font);font-size:13px;
  outline:none;transition:border-color .18s,box-shadow .18s;
}
.field-input:focus{border-color:var(--bb);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.field-input::placeholder{color:var(--dim)}

/* DEMO ACCOUNTS */
.demo-accounts{margin-bottom:16px}
.demo-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:8px}
.demo-list{display:flex;flex-direction:column;gap:4px}
.demo-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:7px;border:1px solid var(--b0);
  background:var(--b0);cursor:pointer;transition:all .15s;
}
.demo-item:hover{background:var(--s3);border-color:var(--b1)}
.demo-icon{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.demo-info{flex:1}
.demo-name{font-size:11px;font-weight:600}
.demo-role{font-family:var(--mono);font-size:9px;color:var(--muted)}
.demo-arrow{font-family:var(--mono);font-size:10px;color:var(--dim)}

/* LOGIN BTN */
.login-btn{
  width:100%;padding:12px;border-radius:10px;
  background:var(--blue);border:none;
  color:#fff;font-family:var(--font);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  position:relative;overflow:hidden;
}
.login-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);
  pointer-events:none;
}
.login-btn:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 8px 20px rgba(59,130,246,.3)}
.login-btn:active{transform:translateY(0)}
.login-btn.loading{pointer-events:none;opacity:.7}

/* SPINNER */
.spin{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.error-msg{
  font-family:var(--mono);font-size:10px;color:#fca5a5;
  text-align:center;margin-top:8px;display:none;
}

/* FOOTER */
.footer{text-align:center;margin-top:20px}
.footer-txt{font-family:var(--mono);font-size:10px;color:var(--dim)}

/* ROLE BADGE on demo */
.rb{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px}
.rb-op{background:var(--pd);border:1px solid var(--pb);color:var(--pl)}
.rb-mgr{background:var(--td);border:1px solid var(--tb);color:var(--tl)}
.rb-sup{background:var(--bd);border:1px solid var(--bb);color:var(--bl)}
.rb-arch{background:var(--b0);border:1px solid var(--b1);color:var(--muted)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.logo-block{animation:fadeUp .4s ease both}
.card{animation:fadeUp .4s ease .08s both}

/* LOADING SCREEN */
.loading-screen{
  position:fixed;inset:0;background:var(--bg);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.loading-screen.show{opacity:1;pointer-events:all}
.ls-icon{font-size:40px;animation:fadeUp .3s ease both}
.ls-title{font-size:16px;font-weight:700;animation:fadeUp .3s ease .06s both}
.ls-sub{font-family:var(--mono);font-size:11px;color:var(--muted);animation:fadeUp .3s ease .1s both}
.ls-bar-track{width:200px;height:2px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:8px;animation:fadeUp .3s ease .12s both}
.ls-bar-fill{height:2px;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:2px;width:0%;transition:width .1s linear}
</style>
</head>
<body>

<div class="wrap">

  <!-- LOGO -->
  <div class="logo-block">
    <div class="logo-name">Sinq<em> OS</em></div>
    <div class="logo-sub">AI-платформа управления закупками · Veysəloğlu Group</div>
  </div>

  <!-- LOGIN CARD -->
  <div class="card">
    <div class="card-title">Добро пожаловать</div>
    <div class="card-sub">Выберите роль и войдите в систему</div>

    <!-- ROLE TABS -->
    <div class="role-tabs">
      <div class="role-tab on" onclick="setRole('operator',this)">Сотрудник</div>
      <div class="role-tab" onclick="setRole('supplier',this)">Поставщик</div>
    </div>

    <!-- DEMO ACCOUNTS -->
    <div class="demo-accounts">
      <div class="demo-label">Демо-аккаунты</div>
      <div class="demo-list" id="demo-list"></div>
    </div>

    <!-- FIELDS -->
    <div class="field">
      <label class="field-label">Email / Логин</label>
      <input class="field-input" id="f-email" type="email" placeholder="email@veyseloglu.az" autocomplete="username">
    </div>
    <div class="field">
      <label class="field-label">Пароль</label>
      <input class="field-input" id="f-pass" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')login()">
    </div>

    <button class="login-btn" onclick="login()" id="login-btn">
      <span class="spin" id="login-spin"></span>
      <span id="login-txt">Войти →</span>
    </button>
    <div class="error-msg" id="error-msg">Неверный логин или пароль</div>
  </div>

  <div class="footer">
    <div class="footer-txt">Sinq OS · NESHRIX · 2026</div>
  </div>
</div>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loading-screen">
  <div class="ls-icon" id="ls-icon">🤖</div>
  <div class="ls-title" id="ls-title">Загрузка рабочего места…</div>
  <div class="ls-sub" id="ls-sub">Подключаемся к агентам</div>
  <div class="ls-bar-track">
    <div class="ls-bar-fill" id="ls-bar"></div>
  </div>
</div>

<script>
const accounts={
  operator:[
    {name:'Лейла Мамедова',role:'Оператор приёмки',email:'leyla@veyseloglu.az',pass:'1234',icon:'👩‍💼',iconBg:'background:var(--pd);border:1px solid var(--pb)',badge:'rb-op',badgeLabel:'Оператор',dest:'veyseloglu_operator.html',chatDest:'veyseloglu_chat.html?role=operator',loadIcon:'📄',loadTitle:'Рабочее место оператора',loadSub:'Загружаем очередь накладных…'},
    {name:'Ирада Гусейнова',role:'Менеджер по закупкам',email:'irada@veyseloglu.az',pass:'1234',icon:'👩‍💼',iconBg:'background:var(--td);border:1px solid var(--tb)',badge:'rb-mgr',badgeLabel:'Менеджер',dest:'veyseloglu_manager.html',chatDest:'veyseloglu_chat.html?role=manager',loadIcon:'📊',loadTitle:'Менеджер по закупкам',loadSub:'Загружаем данные за сегодня…'},
    
    {name:'Администратор',role:'Полный доступ · настройки системы',email:'admin@veyseloglu.az',pass:'1234',icon:'⚙️',iconBg:'background:var(--gd);border:1px solid var(--gb)',badge:'rb-arch',badgeLabel:'Директор',dest:'veyseloglu_admin.html',chatDest:'veyseloglu_chat.html?role=admin',loadIcon:'⚙️',loadTitle:'Панель администратора',loadSub:'Загружаем систему…'},
  ],
  supplier:[
    {name:'Parvaз Group',role:'Загрузка накладных',email:'zakupki@parvaz.az',pass:'1234',icon:'🏭',iconBg:'background:var(--ad);border:1px solid var(--ab)',badge:'rb-sup',badgeLabel:'Поставщик',dest:'veyseloglu_supplier.html',loadIcon:'📤',loadTitle:'Портал поставщика',loadSub:'Загружаем ваши документы…'},
    {name:'Araz Food LLC',role:'Загрузка накладных',email:'zakupki@arazfood.az',pass:'1234',icon:'🏭',iconBg:'background:var(--td);border:1px solid var(--tb)',badge:'rb-sup',badgeLabel:'Поставщик',dest:'veyseloglu_supplier.html',loadIcon:'📤',loadTitle:'Портал поставщика',loadSub:'Загружаем ваши документы…'},
  ],
};

let currentRole='operator';
let selectedAccount=null;

function setRole(role,el){
  currentRole=role;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  selectedAccount=null;
  document.getElementById('f-email').value='';
  document.getElementById('f-pass').value='';
  document.getElementById('error-msg').style.display='none';
  renderDemo();
}

function renderDemo(){
  const list=document.getElementById('demo-list');
  list.innerHTML=accounts[currentRole].map((a,i)=>`
    <div class="demo-item" onclick="selectAccount(${i})">
      <div class="demo-icon" style="${a.iconBg}">${a.icon}</div>
      <div class="demo-info">
        <div class="demo-name">${a.name}</div>
        <div class="demo-role">${a.role}</div>
      </div>
      <span class="rb ${a.badge}">${a.badgeLabel}</span>
      <span class="demo-arrow">→</span>
    </div>`).join('');
}

function selectAccount(i){
  selectedAccount=accounts[currentRole][i];
  document.getElementById('f-email').value=selectedAccount.email;
  document.getElementById('f-pass').value=selectedAccount.pass;
  document.getElementById('error-msg').style.display='none';
}

async function login(){
  const email=document.getElementById('f-email').value.trim();
  const pass=document.getElementById('f-pass').value;
  const btn=document.getElementById('login-btn');
  const spin=document.getElementById('login-spin');
  const txt=document.getElementById('login-txt');
  const err=document.getElementById('error-msg');

  if(!email||!pass){err.textContent='Введите логин и пароль';err.style.display='block';return;}

  // Find matching account
  const allAccounts=[...accounts.operator,...accounts.supplier];
  const match=allAccounts.find(a=>a.email===email&&a.pass===pass);

  if(!match){
    err.textContent='Неверный логин или пароль';
    err.style.display='block';
    // Shake animation
    btn.style.transform='translateX(-4px)';
    setTimeout(()=>btn.style.transform='translateX(4px)',80);
    setTimeout(()=>btn.style.transform='translateX(-3px)',160);
    setTimeout(()=>btn.style.transform='translateX(0)',240);
    return;
  }

  err.style.display='none';

  // Loading state
  btn.classList.add('loading');
  spin.style.display='block';
  txt.textContent='Входим…';

  // Show loading screen
  await sleep(400);
  showLoading(match);
  await animateBar();
  await sleep(300);

  // Show launch screen instead of redirect (works with local files)
  showLaunch(match);
}

function showLaunch(account){
  const ls=document.getElementById('loading-screen');
  ls.innerHTML=`
    <div style="text-align:center;max-width:320px;animation:fadeUp .35s ease both">
      <div style="font-size:52px;margin-bottom:16px">${account.loadIcon}</div>
      <div style="font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px">${account.loadTitle}</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:28px">
        Вы вошли как <span style="color:var(--text)">${account.name}</span>
      </div>
      <a href="${account.dest}" target="_blank" style="
        display:block;width:100%;padding:13px 20px;border-radius:10px;
        background:var(--blue);color:#fff;font-family:var(--font);
        font-size:14px;font-weight:700;text-decoration:none;
        transition:all .18s;cursor:pointer;
        box-shadow:0 8px 20px rgba(59,130,246,.3);
      " onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='var(--blue)'">
        Открыть ${account.loadTitle} →
      </a>
      <div style="margin-top:14px">
        <span onclick="resetLogin()" style="font-family:var(--mono);font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px">
          ← Сменить аккаунт
        </span>
      </div>
    </div>`;
}

function resetLogin(){
  const ls=document.getElementById('loading-screen');
  ls.classList.remove('show');
  const btn=document.getElementById('login-btn');
  const spin=document.getElementById('login-spin');
  const txt=document.getElementById('login-txt');
  btn.classList.remove('loading');
  spin.style.display='none';
  txt.textContent='Войти →';
}

function showLoading(account){
  const ls=document.getElementById('loading-screen');
  document.getElementById('ls-icon').textContent=account.loadIcon;
  document.getElementById('ls-title').textContent=account.loadTitle;
  document.getElementById('ls-sub').textContent=account.loadSub;
  document.getElementById('ls-bar').style.width='0%';
  ls.classList.add('show');
}

async function animateBar(){
  const bar=document.getElementById('ls-bar');
  const steps=[15,35,55,70,85,95,100];
  for(const w of steps){
    bar.style.width=w+'%';
    await sleep(120+Math.random()*80);
  }
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// INIT
renderDemo();

// Pre-fill if URL has role param
const params=new URLSearchParams(location.search);
if(params.get('role')==='supplier'){
  setRole('supplier',document.querySelectorAll('.role-tab')[1]);
}
</script>
</body>
</html>
